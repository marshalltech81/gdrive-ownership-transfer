name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python scripts/check_conventional_commit.py --message "$PR_TITLE"

      - name: Validate pushed commit subjects
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python scripts/check_conventional_commit.py --range "${{ github.event.before }}..${{ github.sha }}"

  quality:
    name: Quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - workflow-lint
      - conventional-commits
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest

      - name: CLI smoke test
        run: uv run gdrive-ownership-transfer --help

      - name: Build distributions
        run: uv build
